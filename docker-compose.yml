services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ald
      POSTGRES_PASSWORD: ald
      POSTGRES_DB: ald
    ports:
      - "127.0.0.1:65432:5432"
    volumes:
      - ald_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ald -d ald"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  ald_postgres:
