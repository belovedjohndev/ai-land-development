services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ald
      POSTGRES_PASSWORD: ald
      POSTGRES_DB: ald
    ports:
      - "127.0.0.1:65432:5432"
    volumes:
      - ald_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ald -d ald"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ald-local-access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ald-local-secret-change-me}
    ports:
      - "127.0.0.1:6900:9000"
      - "127.0.0.1:6901:9001"
    volumes:
      - ald_minio:/data
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ald-local-access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ald-local-secret-change-me}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-ald-documents}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done
        mc mb --ignore-existing "local/$${STORAGE_BUCKET}"
        mc anonymous set none "local/$${STORAGE_BUCKET}"
volumes:
  ald_postgres:
  ald_minio:
